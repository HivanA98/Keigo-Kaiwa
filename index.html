<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keigo Flashcards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-fireworks">

    <div class="container">
        <h2 style="color: var(--text-heading-color); text-shadow: 2px 2px 4px rgba(0,0,0,0.7);">Latihan Keigo</h2>
        <h2 style="color: var(--text-heading-color); text-shadow: 2px 2px 4px rgba(0,0,0,0.7);">敬語の練習</h2>
        
        <div class="card-container" id="card-container">
            <div class="card" id="card">
                <div class="card-face card-front" id="card-front">
                    Memuat data...
                </div>
                <div class="card-face card-back" id="card-back">
                    </div>
            </div>
        </div>

        <div class="controls">
            <button id="btn-flip">Arti / 意味</button>
            <button id="btn-next">Selanjutnya / 次</button>
        </div>
    </div>

    <div class="theme-switcher-bottom">
        <select id="theme-select">
            <option value="theme-fireworks" selected>🎇 Pesta Kembang Api</option>
            <option value="theme-demonslayer">⚔️ Demon Slayer</option>
            <option value="theme-mountain">⛰️ Pegunungan</option>

        </select>
    </div>

    <script src="script.js"></script>
</body>
</html>
