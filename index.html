<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaiwa Flashcards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-fireworks">

    <div class="theme-switcher">
        <label for="theme-select">Pilih Tema:</label>
        <select id="theme-select">
            <option value="theme-fireworks" selected>Pesta Kembang Api (Default)</option>
            <option value="theme-demonslayer">Demon Slayer Style</option>
        </select>
    </div>

    <div class="container">
        <h2 style="color: var(--text-heading-color); text-shadow: 2px 2px 4px rgba(0,0,0,0.7);">Latihan Kaiwa</h2>
        
        <div class="card-container">
            <div class="card" id="card">
                <div class="card-face card-front" id="card-front">
                    Memuat data...
                </div>
                <div class="card-face card-back" id="card-back">
                    </div>
            </div>
        </div>

        <div class="controls">
            <button id="btn-flip">Balik Kartu</button>
            <button id="btn-next">Selanjutnya</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
